name: Validate Skills

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  validate-skills:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Validate skills using skill-validator
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_TOKEN }}
        run: |
          cat <<EOF > validate_prompt.txt
          Run the skill-validator skill to validate all skills in the .agents/skills directory.
          EOF
          copilot -s -p "$(cat validate_prompt.txt)"
